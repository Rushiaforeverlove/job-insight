<!DOCTYPE html>
<html>

<head>
    <title>{{ job.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <a href="/" class="btn btn-secondary mb-3">← 回列表</a>

        <div class="card shadow-sm">

            <div class="card-body">

                <h2>{{ job.title }}</h2>

                <p>🏢 公司：{{ job.company }}</p>
                <p>💰 薪資：{{ job.salary }}</p>
                <p>📍 地點：{{ job.location }}</p>
                <p>🛠 技能：{{ job.skill }}</p>

            </div>

        </div>

    </div>

</body>

</html>
